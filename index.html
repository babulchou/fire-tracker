<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRE 家庭财务自由仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --bg2: #131720;
            --bg3: #1a1f2e;
            --bg4: #222839;
            --border: #2a3042;
            --text: #e2e4e9;
            --text2: #8b93a7;
            --text3: #5a6178;
            --accent: #7c6cf0;
            --accent2: #a78bfa;
            --green: #34d399;
            --green-bg: rgba(52,211,153,0.12);
            --yellow: #fbbf24;
            --yellow-bg: rgba(251,191,36,0.12);
            --red: #f87171;
            --red-bg: rgba(248,113,113,0.12);
            --blue: #60a5fa;
            --blue-bg: rgba(96,165,250,0.12);
            --radius: 14px;
            --shadow: 0 2px 16px rgba(0,0,0,0.25);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1040 0%, #2d1b69 40%, #1a1040 100%);
            border-bottom: 1px solid var(--border);
            padding: 28px 0 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #c4b5fd, #f0abfc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .header .sub {
            color: var(--text2);
            font-size: 13px;
            margin-top: 4px;
        }
        .header .updated {
            color: var(--text3);
            font-size: 11px;
            margin-top: 6px;
        }

        /* Layout */
        .container { max-width: 1120px; margin: 0 auto; padding: 20px 16px 40px; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        .empty-state .icon { font-size: 56px; margin-bottom: 16px; opacity: 0.6; }
        .empty-state h2 { font-size: 20px; color: var(--text); margin-bottom: 12px; }
        .empty-state p { color: var(--text2); font-size: 14px; line-height: 1.8; max-width: 500px; margin: 0 auto; }
        .empty-state .hint {
            margin-top: 24px;
            padding: 16px 20px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 13px;
            color: var(--text2);
            text-align: left;
            max-width: 560px;
            margin-left: auto;
            margin-right: auto;
        }
        .empty-state .hint code {
            background: var(--bg4);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            color: var(--accent2);
        }

        /* Dashboard Grid */
        .dash { display: grid; gap: 16px; }
        .dash-top { grid-template-columns: repeat(4, 1fr); }
        .dash-mid { grid-template-columns: 1fr 1fr; }
        .dash-wide { grid-template-columns: 1fr; }
        .dash-tri { grid-template-columns: 1fr 1fr 1fr; }

        @media (max-width: 800px) {
            .dash-top { grid-template-columns: 1fr 1fr; }
            .dash-mid, .dash-tri { grid-template-columns: 1fr; }
        }

        /* Cards */
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }
        .card-head {
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-head .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        /* Stat cards */
        .stat { text-align: center; padding: 18px 12px; }
        .stat .val {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }
        .stat .label {
            font-size: 11px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .stat .sub {
            font-size: 11px;
            color: var(--text2);
        }

        /* Progress ring */
        .ring-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
        }
        .ring { position: relative; width: 160px; height: 160px; }
        .ring svg { transform: rotate(-90deg); }
        .ring .center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            text-align: center;
        }
        .ring .center .pct { font-size: 32px; font-weight: 700; color: var(--accent2); }
        .ring .center .lbl { font-size: 11px; color: var(--text3); }

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            text-align: left;
            padding: 8px 10px;
            font-size: 11px;
            color: var(--text3);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 9px 10px;
            border-bottom: 1px solid rgba(42,48,66,0.5);
            color: var(--text);
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(124,108,240,0.04); }
        .ticker { font-weight: 700; color: var(--accent2); }
        .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }

        /* Tags */
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .tag-green { background: var(--green-bg); color: var(--green); }
        .tag-yellow { background: var(--yellow-bg); color: var(--yellow); }
        .tag-red { background: var(--red-bg); color: var(--red); }
        .tag-blue { background: var(--blue-bg); color: var(--blue); }

        /* Allocation bar */
        .alloc-bar {
            display: flex;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin: 12px 0 10px;
        }
        .alloc-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 12px;
            color: var(--text2);
        }
        .alloc-legend .item { display: flex; align-items: center; gap: 5px; }
        .alloc-legend .swatch { width: 8px; height: 8px; border-radius: 50%; }

        /* Chart */
        .chart-box { position: relative; height: 260px; margin-top: 8px; }

        /* Change log */
        .log-item {
            display: flex;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(42,48,66,0.4);
            font-size: 13px;
        }
        .log-item:last-child { border-bottom: none; }
        .log-date { color: var(--text3); min-width: 90px; font-family: monospace; font-size: 12px; }
        .log-text { color: var(--text2); }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            color: var(--text3);
            border-top: 1px solid var(--border);
            margin-top: 32px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Animations */
        .fade { animation: fadeUp 0.4s ease; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-gap { margin-bottom: 16px; }

        /* Recommendation cards */
        .rec {
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 3px solid;
        }
        .rec h4 { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .rec p { font-size: 12px; color: var(--text2); line-height: 1.6; }
        .rec-info { background: var(--blue-bg); border-color: var(--blue); }
        .rec-info h4 { color: var(--blue); }
        .rec-warn { background: var(--yellow-bg); border-color: var(--yellow); }
        .rec-warn h4 { color: var(--yellow); }
        .rec-good { background: var(--green-bg); border-color: var(--green); }
        .rec-good h4 { color: var(--green); }
    </style>
</head>
<body>

<div class="header">
    <h1>FIRE 家庭财务自由仪表盘</h1>
    <div class="sub">双人家庭 Fat FIRE 规划 - 45岁退休 + 高品质生活 + 养育孩子</div>
    <div class="updated" id="lastUpdated"></div>
</div>

<div class="container" id="app"></div>

<script>
// Load data and render dashboard
async function init() {
    let data;
    try {
        const resp = await fetch('financial_data.json?' + Date.now());
        if (!resp.ok) throw new Error('No data');
        data = await resp.json();
    } catch (e) {
        // Fallback: try without cache buster
        try {
            const resp2 = await fetch('financial_data.json');
            if (!resp2.ok) throw new Error('No data');
            data = await resp2.json();
        } catch (e2) {
            renderEmpty();
            return;
        }
    }
    try {
        render(data);
    } catch (e) {
        console.error('Dashboard render error:', e);
        document.getElementById('app').innerHTML = `<div class="empty-state fade"><div class="icon">&#x26A0;</div><h2>渲染出错</h2><p style="color:var(--red);">${e.message}<br><br><small style="color:var(--text3);">${e.stack || ''}</small></p></div>`;
    }
}

function renderEmpty() {
    document.getElementById('lastUpdated').textContent = '';
    document.getElementById('app').innerHTML = `
        <div class="empty-state fade">
            <div class="icon">&#x1f4ac;</div>
            <h2>还没有录入财务数据</h2>
            <p>这个仪表盘会自动展示你通过对话录入的财务信息。<br>你只需要用自然语言告诉AI你的财务情况就行。</p>
            <div class="hint">
                <strong style="color:var(--text);">使用方式：</strong><br><br>
                直接对AI说类似这样的话：<br><br>
                <code>"我今年30岁，每月收入2万，支出1万。存款50万人民币。美股有VOO 10万美元、AAPL 5万美元。港股有腾讯3万港币。房贷还剩80万。"</code><br><br>
                AI会自动帮你整理、计算并更新到这个仪表盘中。每次有新的变化只需要告诉AI即可。
            </div>
        </div>
    `;
}

function fmt(n) {
    if (n === null || n === undefined) return '--';
    if (n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
    if (n >= 1000) return '$' + (n/1000).toFixed(1) + 'K';
    return '$' + n.toFixed(0);
}

function fmtCNY(n) {
    if (n === null || n === undefined) return '--';
    if (n >= 10000) return '\u00a5' + (n/10000).toFixed(0) + '万';
    return '\u00a5' + Math.round(n).toLocaleString();
}

function fmtFull(n) {
    if (n === null || n === undefined) return '--';
    return '$' + Math.round(n).toLocaleString();
}

function fmtPct(n) {
    if (n === null || n === undefined) return '--%';
    return n.toFixed(1) + '%';
}

function render(data) {
    const s = data.fire_summary;
    const p = data.profile;
    const a = data.assets;
    const cf = data.monthly_cashflow;
    const alloc = data.allocation;
    const assumptions = data.assumptions;

    // Check if we have any real data
    const hasData = s.net_worth_usd !== null || (a.us_stocks.length + a.hk_stocks.length + a.cash.length) > 0;
    if (!hasData) {
        renderEmpty();
        return;
    }

    document.getElementById('lastUpdated').textContent = '数据更新于 ' + (data.meta.last_updated || '--');

    const progress = s.fire_progress_pct || 0;
    const circumference = 2 * Math.PI * 65;
    const offset = circumference - (circumference * Math.min(progress, 100) / 100);

    // Fire type label
    const fireLabels = { lean: 'Lean FIRE', standard: '标准 FIRE', fat: 'Fat FIRE', barista: 'Barista FIRE', 'Standard FIRE': '标准 FIRE', 'Lean FIRE': 'Lean FIRE', 'Fat FIRE': 'Fat FIRE', 'Barista FIRE': 'Barista FIRE' };
    const fireLabel = fireLabels[p.fire_type] || p.fire_type || '待确认';

    // Annual income
    const ann = data.annual_income || {};

    // Real estate
    const re = a.real_estate && a.real_estate[0] ? a.real_estate[0] : null;

    // FIRE projection
    const proj = data.fire_projection || [];

    // Build holdings tables
    let usStocksHTML = '';
    if (a.us_stocks.length > 0) {
        usStocksHTML = a.us_stocks.map(s => {
            const glColor = s.gain_loss >= 0 ? 'var(--green)' : 'var(--red)';
            const glSign = s.gain_loss >= 0 ? '+' : '';
            return `
            <tr>
                <td class="ticker">${s.ticker}</td>
                <td>${s.name || '--'}</td>
                <td class="mono">${s.shares ? s.shares.toLocaleString() : '--'}</td>
                <td class="mono">${s.market_value ? '$'+s.market_value.toLocaleString() : '--'}</td>
                <td class="mono" style="color:${glColor};">${s.gain_loss !== undefined ? glSign + '$' + s.gain_loss.toFixed(0) + ' (' + glSign + s.gain_loss_pct.toFixed(1) + '%)' : '--'}</td>
            </tr>
        `}).join('');
    } else {
        usStocksHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text3);">暂无持仓</td></tr>';
    }

    let hkStocksHTML = '';
    if (a.hk_stocks.length > 0) {
        hkStocksHTML = a.hk_stocks.map(s => {
            const glColor = s.gain_loss_hkd >= 0 ? 'var(--green)' : 'var(--red)';
            const glSign = s.gain_loss_hkd >= 0 ? '+' : '';
            const mv = s.market_value_hkd || s.market_value || 0;
            return `
            <tr>
                <td class="ticker">${s.ticker}</td>
                <td>${s.name || '--'}</td>
                <td class="mono">${s.shares ? s.shares.toLocaleString() : '--'}</td>
                <td class="mono">HK$${Math.round(mv).toLocaleString()}</td>
                <td class="mono" style="color:${glColor};">${s.gain_loss_hkd !== undefined ? glSign + 'HK$' + s.gain_loss_hkd.toFixed(0) + ' (' + glSign + s.gain_loss_pct.toFixed(1) + '%)' : '--'}</td>
            </tr>
        `}).join('');
    } else {
        hkStocksHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text3);">暂无持仓</td></tr>';
    }

    // Cash list
    let cashHTML = '';
    if (a.cash.length > 0) {
        cashHTML = a.cash.map(c => `
            <tr>
                <td>${c.account || '--'}</td>
                <td class="mono" style="color:var(--green);">${c.currency === 'USD' ? '$' : c.currency === 'HKD' ? 'HK$' : '\u00a5'}${Math.round(c.amount).toLocaleString()}</td>
                <td>${c.currency || '--'}</td>
                <td>${c.note || '--'}</td>
            </tr>
        `).join('');
    } else {
        cashHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text3);">暂无记录</td></tr>';
    }

    // Liabilities
    let liabHTML = '';
    if (data.liabilities.length > 0) {
        liabHTML = data.liabilities.map(l => {
            const lCurrSym = l.currency === 'CNY' ? '\u00a5' : l.currency === 'HKD' ? 'HK$' : '$';
            return `
            <tr>
                <td>${l.type || '--'}</td>
                <td class="mono" style="color:var(--red);">${l.balance ? lCurrSym + Math.round(l.balance).toLocaleString() : '待录入'}</td>
                <td class="mono">${l.interest_rate ? l.interest_rate + '%' : '--'}</td>
                <td class="mono">${l.monthly_payment ? lCurrSym + l.monthly_payment.toLocaleString() : '--'}</td>
                <td>${l.maturity || '--'}</td>
            </tr>
        `}).join('');
    } else {
        liabHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text3);">无负债</td></tr>';
    }

    // Allocation data
    const allocColors = {
        us_stocks: '#7c6cf0',
        hk_stocks: '#e879f9',
        bonds: '#34d399',
        cash: '#94a3b8',
        other: '#fbbf24'
    };
    const allocItems = [];
    if (alloc.us_stocks_pct) allocItems.push({ name: '美股', pct: alloc.us_stocks_pct, color: allocColors.us_stocks });
    if (alloc.hk_stocks_pct) allocItems.push({ name: '港股', pct: alloc.hk_stocks_pct, color: allocColors.hk_stocks });
    if (alloc.bonds_pct) allocItems.push({ name: '债券', pct: alloc.bonds_pct, color: allocColors.bonds });
    if (alloc.cash_pct) allocItems.push({ name: '现金', pct: alloc.cash_pct, color: allocColors.cash });
    if (alloc.other_pct) allocItems.push({ name: '其他', pct: alloc.other_pct, color: allocColors.other });

    const allocBarHTML = allocItems.length > 0
        ? allocItems.map(a => `<div style="width:${a.pct}%;background:${a.color};"></div>`).join('')
        : '<div style="width:100%;background:var(--border);"></div>';

    const allocLegendHTML = allocItems.length > 0
        ? allocItems.map(a => `<div class="item"><div class="swatch" style="background:${a.color};"></div>${a.name} ${a.pct.toFixed(1)}%</div>`).join('')
        : '<div class="item" style="color:var(--text3);">待录入资产后自动计算</div>';

    // Change log
    const logHTML = data.change_log.slice(-10).reverse().map(l =>
        `<div class="log-item"><div class="log-date">${l.date}</div><div class="log-text">${l.action}${l.details ? ' - ' + l.details : ''}</div></div>`
    ).join('');

    // Monthly cashflow
    const currSym = cf.currency === 'CNY' ? '\u00a5' : cf.currency === 'HKD' ? 'HK$' : '$';
    const totalIncome = cf.total_income || cf.income_after_tax || 0;
    const incomeDisplay = totalIncome ? currSym + totalIncome.toLocaleString() : '--';
    const totalExpense = cf.total_expenses || ((cf.mortgage || cf.fixed_expenses || 0) + (cf.living_expenses || 0));
    const expenseDisplay = totalExpense > 0 ? currSym + totalExpense.toLocaleString() : '--';
    const monthlySaving = cf.monthly_savings || (totalIncome - totalExpense) || null;
    const savingDisplay = monthlySaving !== null ? currSym + monthlySaving.toLocaleString() : '--';
    const housingFund = cf.housing_fund || 0;
    const mortgage = cf.mortgage || cf.fixed_expenses || 0;
    const livingExp = cf.living_expenses || 0;

    // Milestones
    let milestonesHTML = '';
    if (data.milestones && data.milestones.length > 0) {
        milestonesHTML = data.milestones.map(m => {
            const pct = m.progress_pct || (m.status === '已达成' ? 100 : 0);
            const statusClass = m.status === '已达成' ? 'tag-green' : pct >= 50 ? 'tag-yellow' : 'tag-blue';
            const statusLabel = m.status === '已达成' ? '已达成' : pct.toFixed(0) + '%';
            const targetDisplay = m.target_cny ? fmtCNY(m.target_cny) : fmtFull(m.target_usd);
            const currentDisplay = m.current_cny ? fmtCNY(m.current_cny) : fmtFull(m.current_usd);
            return `
                <tr>
                    <td><strong>${m.name}</strong></td>
                    <td class="mono">${targetDisplay}</td>
                    <td class="mono">${currentDisplay}</td>
                    <td><span class="tag ${statusClass}">${statusLabel}</span></td>
                </tr>
            `;
        }).join('');
    }

    // Recommendations
    let recsHTML = '';
    if (s.savings_rate_pct !== null) {
        if (s.savings_rate_pct < 30) {
            recsHTML += `<div class="rec rec-warn"><h4>储蓄率偏低</h4><p>当前储蓄率 ${s.savings_rate_pct.toFixed(0)}%，建议提升至40%以上。每提高10%储蓄率，可缩短约5年退休时间。</p></div>`;
        } else if (s.savings_rate_pct >= 50) {
            recsHTML += `<div class="rec rec-good"><h4>储蓄率优秀</h4><p>当前综合储蓄率 ${s.savings_rate_pct.toFixed(0)}%（含年终奖），非常出色！确保多余储蓄投入低成本指数基金，而非闲置在现金账户。</p></div>`;
        } else {
            recsHTML += `<div class="rec rec-info"><h4>储蓄率良好</h4><p>当前储蓄率 ${s.savings_rate_pct.toFixed(0)}%，处于合理水平。如能提升到50%以上将显著加速FIRE进程。</p></div>`;
        }
    }
    // Cash allocation warning
    if (alloc.cash_pct && alloc.cash_pct > 30) {
        recsHTML += `<div class="rec rec-warn"><h4>现金占比过高 (${alloc.cash_pct.toFixed(0)}%)</h4><p>建议仅保留3-6个月应急金（约¥15-16万），将剩余现金（约¥40万+）逐步投入宽基ETF如VOO/VTI（美股）和恒生科技ETF（港股），可显著加速FIRE进程。</p></div>`;
    }
    // Mortgage analysis
    if (data.liabilities.length > 0) {
        const mortgage_item = data.liabilities.find(l => l.type === '房贷');
        if (mortgage_item && mortgage_item.interest_rate) {
            const mortRate = mortgage_item.interest_rate;
            const investReturn = assumptions.expected_annual_return * 100;
            if (mortRate < investReturn) {
                recsHTML += `<div class="rec rec-good"><h4>房贷利率优势</h4><p>房贷利率 ${mortRate}% 低于预期投资回报 ${investReturn}%，利差约 ${(investReturn - mortRate).toFixed(1)} 个百分点。不建议提前还贷，多余资金应投入市场获取更高回报。</p></div>`;
            } else {

                                    const pct = fireTarget ? (val / fireTarget * 100).toFixed(1) : 0;
                                    if (useCNY) {
                                        if (ctx.datasetIndex === 0) return '资产: \u00a5' + (val/10000).toFixed(0) + '万 (' + pct + '%)';
                                        return 'FIRE目标: \u00a5' + (val/10000).toFixed(0) + '万';
                                    } else {
                                        if (ctx.datasetIndex === 0) return '资产: $' + Math.round(val).toLocaleString() + ' (' + pct + '%)';
                                        return 'FIRE目标: $' + Math.round(val).toLocaleString();
                                    }
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#5a6178', font: { size: 11 } },
                            grid: { color: 'rgba(42,48,66,0.5)' }
                        },
                        y: {
                            ticks: {
                                color: '#5a6178',
                                font: { size: 11 },
                                callback: v => useCNY ? '\u00a5' + (v/10000).toFixed(0) + '万' : (v >= 1000000 ? '$' + (v/1000000).toFixed(1) + 'M' : '$' + (v/1000).toFixed(0) + 'K')
                            },
                            grid: { color: 'rgba(42,48,66,0.5)' }
                        }
                    }
                }
            });
        }, 100);
    }
}

init();
</script>
